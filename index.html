<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestMiner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f9fefb 0%, #f3fcf6 50%, #f9fefb 100%);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px 40px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 1rem;
      color: #64748b;
      margin-top: 8px;
    }

    .search {
      position: relative;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
    }

    .search input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 18px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #1e293b;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .search input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .search input::placeholder { color: #94a3b8; }

    .search button {
      padding: 14px 28px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .search button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    .search button:active { transform: translateY(0); }

    .search button:disabled {
      background: #86efac;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .autocomplete-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.93rem;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.12s;
    }

    .autocomplete-item .lang-icon {
      font-size: 1.2rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .autocomplete-item:first-child { border-radius: 12px 12px 0 0; }
    .autocomplete-item:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }
    .autocomplete-item:only-child { border-radius: 12px; }

    .autocomplete-item:hover,
    .autocomplete-item.active { background: #f0fdf4; }

    .autocomplete-item mark {
      background: #fef9c3;
      color: inherit;
      padding: 0;
      border-radius: 3px;
    }

    .autocomplete-item .match-detail {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-left: 8px;
    }

    .autocomplete-item .ac-tag {
      font-size: 0.72rem;
      color: #94a3b8;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }

    .autocomplete-item .ac-name {
      flex: 1;
      min-width: 0;
    }

    .autocomplete-item .ac-lang {
      font-size: 0.78rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .autocomplete-item .ac-lang .lang-icon {
      font-size: 0.95rem;
      width: auto;
    }

    .recent {
      margin-bottom: 24px;
      display: none;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }

    .recent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .recent-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .recent-clear {
      font-size: 0.75rem;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .recent-clear:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recent-item {
      font-size: 0.85rem;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #dcfce7;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .recent-item:hover {
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .recent-item .recent-remove {
      margin-left: 6px;
      color: #86efac;
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1;
    }

    .recent-item:hover .recent-remove {
      color: #ef4444;
    }

    #error {
      color: #ef4444;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }

    #results { display: none; }

    .results-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 16px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }

    .owner-link {
      color: #16a34a;
      text-decoration: none;
    }

    .owner-link:hover {
      text-decoration: underline;
    }

    .results-title-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-link-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #64748b;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .copy-link-btn:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .stat-card.clickable {
      cursor: pointer;
    }

    .stat-card.clickable:hover {
      border-color: #bbf7d0;
    }

    .stat-card.active {
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }

    .file-list-panel {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      max-height: 350px;
      overflow-y: auto;
      display: none;
    }

    .file-list-panel.visible {
      display: block;
    }

    .file-list-panel .file-list-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .file-list-panel .file-list-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #94a3b8;
      padding: 0 4px;
      line-height: 1;
    }

    .file-list-panel .file-list-close:hover {
      color: #ef4444;
    }

    .file-list-panel ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .file-list-panel li {
      font-size: 0.82rem;
      color: #1e293b;
      padding: 3px 0;
      font-family: monospace;
      border-bottom: 1px solid #f8fafc;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #22c55e;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .repo-item {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .repo-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border-color: #bbf7d0;
    }

    .repo-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: #16a34a;
    }

    .repo-item-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .repo-item-stars {
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 500;
    }

    .repo-item-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .repo-topic {
      font-size: 0.75rem;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 500;
    }

    .repo-item-stats {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .repo-item-stats span {
      font-weight: 500;
    }

    .repo-item-stats .stat-value {
      color: #22c55e;
      font-weight: 700;
    }

    .owner-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      grid-column: 1 / -1;
    }

    .owner-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .owner-table th {
      text-align: left;
      padding: 8px 8px;
      font-weight: 600;
      color: #64748b;
      border-bottom: 2px solid #e2e8f0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      width: 1%;
      white-space: nowrap;
    }

    .owner-table th:first-child {
      width: auto;
      white-space: normal;
    }

    .owner-table td {
      padding: 8px 8px;
      border-bottom: 1px solid #f1f5f9;
      color: #1e293b;
      font-size: 0.82rem;
    }

    .owner-table th:nth-child(n+3):nth-child(-n+6),
    .owner-table td:nth-child(n+3):nth-child(-n+6) {
      text-align: right;
    }

    .owner-table-row {
      cursor: pointer;
      transition: background 0.12s;
    }

    .owner-table-row:hover {
      background: #f0fdf4;
    }

    .repo-name-cell {
      font-weight: 600;
      color: #16a34a;
      width: 180px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggestions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .suggestion-label {
      font-size: 0.82rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .suggestion-btn {
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #dcfce7;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .suggestion-btn:hover {
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e2e8f0;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sortable-th {
      cursor: pointer;
      user-select: none;
    }

    .sortable-th:hover {
      color: #16a34a;
    }

    .sort-arrow {
      font-size: 0.7rem;
    }
    @media (max-width: 600px) {
      .owner-table th,
      .owner-table td {
        padding: 6px 4px;
        font-size: 0.72rem;
      }
      .owner-table th .th-label span {
        display: block;
      }
      .lang-text {
        display: none;
      }
      .lang-text.no-icon {
        display: inline;
      }
    }

    .th-short { display: none; }

    @media (max-width: 600px) {
      .has-short-label .th-full { display: none; }
      .has-short-label .th-short { display: inline; }
    }

    #tree-chart {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      max-height: 600px;
      overflow-y: auto;
    }

    .tree-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tree-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
      justify-content: center;
    }

    .tree-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #64748b;
    }

    .block-map {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .block-dir {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .block-dir-label {
      font-size: 0.72rem;
      font-family: monospace;
      color: #64748b;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .block-cells {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }

    .block-cell {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      cursor: default;
      transition: transform 0.1s, border-radius 0.15s;
      position: relative;
    }

    .block-map.circles .block-cell {
      border-radius: 50%;
    }

    .block-cell:hover {
      transform: scale(1.8);
      z-index: 10;
    }

    .block-tooltip {
      position: fixed;
      pointer-events: none;
      background: #1e293b;
      color: #fff;
      font-size: 0.65rem;
      font-family: monospace;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.1s;
    }

    .block-tooltip.visible {
      opacity: 1;
    }

    .block-sort {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: #94a3b8;
      flex-wrap: wrap;
    }

    .block-sort-btn {
      font-size: 0.73rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #64748b;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .block-sort-btn:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }

    .block-sort-btn.active {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    .block-sort-sep {
      color: #e2e8f0;
      margin: 0 2px;
    }

    .block-separator {
      border-bottom: 1px solid #f1f5f9;
      margin-bottom: 12px;
    }

    .depth-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .depth-nav-label {
      font-family: monospace;
      font-size: 0.73rem;
      color: #64748b;
    }

    .export-btns {
      display: flex;
      gap: 1px;
    }

    .export-png-btn {
      font-size: 0.73rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #64748b;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 3px 10px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .export-btns .export-png-btn:first-child {
      border-radius: 6px 0 0 6px;
      border-right: none;
    }

    .export-btns .export-png-btn:last-child {
      border-radius: 0 6px 6px 0;
    }

    .export-png-btn:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }

    .export-png-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .export-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    .export-title i {
      font-size: 1.3rem;
    }

    .shape-toggle {
      width: 22px;
      height: 22px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
      padding: 0;
      margin-left: auto;
    }

    .shape-toggle:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .shape-toggle-icon {
      width: 10px;
      height: 10px;
      background: #64748b;
      border-radius: 2px;
      transition: border-radius 0.15s;
    }

    .shape-toggle.active .shape-toggle-icon {
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>TestMiner</h1>
      <p>Analyze test practices in GitHub repositories</p>
    </div>

    <div class="search">
      <div class="search-input-wrap">
        <input id="repo-input" type="text" placeholder="GitHub URL, owner/repo, or owner" autocomplete="off" />
        <div id="autocomplete-list" class="autocomplete-list"></div>
      </div>
      <button id="analyze-btn" onclick="analyze()">Analyze</button>
    </div>

    <div id="suggestions" class="suggestions">
      <span class="suggestion-label">Try:</span>
      <button class="suggestion-btn" data-value="google">google</button>
      <button class="suggestion-btn" data-value="microsoft">microsoft</button>
      <button class="suggestion-btn" data-value="facebook/react">facebook/react</button>
      <button class="suggestion-btn" data-value="openai/codex">openai/codex</button>
    </div>

    <div id="recent" class="recent">
      <div class="recent-header">
        <div class="recent-label">Recently viewed</div>
        <button class="recent-clear" id="recent-clear">Clear all</button>
      </div>
      <div class="recent-list" id="recent-list"></div>
    </div>

    <div id="error"></div>

    <div id="results">
      <h2 id="results-title" class="results-title"><span id="results-title-text"></span><span class="results-title-actions"><a id="gh-link" target="_blank" rel="noopener" style="color:#1e293b;text-decoration:none;"><i class="devicon-github-original" style="font-size:1.1rem;"></i></a><button class="copy-link-btn" id="copy-link-btn">Copy link</button></span></h2>
      <div class="stats-grid" id="stats-grid"></div>
      <div id="tree-chart" style="display:none;margin-top:16px;"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="js/app.js?v=5"></script>
  <script>
    loadExtensions();

    var analyzing = false;
    function showError(msg) {
      var errorEl = document.getElementById('error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function setBtnLoading(text) {
      var btn = document.getElementById('analyze-btn');
      btn.disabled = true;
      btn.textContent = text;
    }

    function setBtnReady() {
      var btn = document.getElementById('analyze-btn');
      btn.disabled = false;
      btn.textContent = 'Analyze';
    }

    async function analyzeOwner(owner) {
      setBtnLoading('Searching...');
      var repos = await fetchOwnerRepos(owner);
      setBtnReady();
      if (!repos) {
        showError('Could not find GitHub user "' + owner + '".');
        return;
      }
      renderOwnerRepos(owner, repos);
      saveRecent(owner);
      history.replaceState(null, '', '#' + owner);
    }

    async function analyzeSingleRepo(ownerRepo) {
      setBtnLoading('Analyzing...');
      var response = await ensureAnalyzeRepo(ownerRepo);
      setBtnReady();

      if (response.error === 'too_large') {
        var tooLargeOwner = ownerRepo.split('/')[0];
        showError('Repository "' + ownerRepo + '"size is too large. Try another repository of ' + tooLargeOwner + '...');
        var tooLargeRepos = await fetchOwnerRepos(tooLargeOwner);
        if (tooLargeRepos) {
          renderOwnerRepos(tooLargeOwner, tooLargeRepos);
        }
        return;
      }

      if (response.error) {
        showError('Could not fetch repository data. Check the repo name and try again.');
        return;
      }

      renderRepoStats(ownerRepo, response.result.stats);
      try { renderFileTree(ownerRepo); } catch (e) { console.error('Tree render error:', e); }
      saveRecent(ownerRepo);
      history.replaceState(null, '', '#' + ownerRepo);
    }

    function renderRepoStats(ownerRepo, stats) {
      var cards = [
        { label: 'Total files',       value: stats.total },
        { label: 'Source files',      value: stats.sourceFiles,       category: 'source' },
        { label: 'Test files',        value: stats.testFiles,         category: 'test' },
        { label: 'Test ratio',        value: stats.testRatio + '%', alwaysShow: true },
        { label: 'Test-related files',value: stats.testRelatedFiles,  category: 'test-related' },
        { label: 'Mock files',        value: stats.mockFiles,         category: 'mock' },
        { label: 'E2E files',         value: stats.e2eFiles,          category: 'e2e' },
        { label: 'Snapshot files',    value: stats.snapshotFiles,     category: 'snapshot' },
        { label: 'CI test files',     value: stats.ciTestFiles,       category: 'ci-test' },
        { label: 'Smoke files',       value: stats.smokeFiles,        category: 'smoke' },
        { label: 'Fixture files',     value: stats.fixtureFiles,      category: 'fixture' },
        { label: 'Benchmark files',   value: stats.benchmarkFiles,    category: 'benchmark' },
      ];

      var cached = analyzeRepoCache[ownerRepo];
      var hasFiles = cached && cached.files;

      var grid = document.getElementById('stats-grid');
      grid.innerHTML = cards.filter(function (c) {
        return c.alwaysShow || c.value > 0;
      }).map(function (c) {
        var isClickable = c.category && hasFiles && (hasFiles[c.category] || []).length > 0;
        var cls = 'stat-card' + (isClickable ? ' clickable' : '');
        var dataAttr = isClickable ? ' data-category="' + c.category + '"' : '';
        return '<div class="' + cls + '"' + dataAttr + '><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>';
      }).join('') + '<div class="file-list-panel" id="file-list-panel"><div class="file-list-header"><span id="file-list-title"></span><button class="file-list-close" id="file-list-close">&times;</button></div><ul id="file-list-items"></ul></div>';

      setupStatCardClicks(grid, ownerRepo);

      var ownerPart = ownerRepo.split('/')[0];
      var repoPart = ownerRepo.split('/')[1];
      var ownerIcon = '<i class="devicon-' + ownerPart.toLowerCase() + '-plain colored" style="font-size:1.3rem;margin-right:6px;"></i>';
      document.getElementById('results-title-text').innerHTML = ownerIcon + '<a class="owner-link" href="#' + ownerPart + '">' + ownerPart + '</a> / ' + repoPart;
      document.getElementById('gh-link').href = 'https://github.com/' + ownerRepo;
      document.getElementById('results').style.display = 'block';
    }

    function setupStatCardClicks(grid, ownerRepo) {
      var cached = analyzeRepoCache[ownerRepo];
      if (!cached || !cached.files) return;

      grid.querySelectorAll('.stat-card.clickable').forEach(function (card) {
        card.addEventListener('click', function () {
          var category = this.getAttribute('data-category');
          var files = cached.files[category] || [];
          var panel = document.getElementById('file-list-panel');
          var wasActive = this.classList.contains('active');

          grid.querySelectorAll('.stat-card.active').forEach(function (c) { c.classList.remove('active'); });

          if (wasActive) {
            panel.classList.remove('visible');
            return;
          }

          this.classList.add('active');
          document.getElementById('file-list-title').textContent = this.querySelector('.label').textContent + ' (' + files.length + ')';
          document.getElementById('file-list-items').innerHTML = files.map(function (f) {
            return '<li>' + f + '</li>';
          }).join('');
          panel.classList.add('visible');
        });
      });

      document.getElementById('file-list-close').addEventListener('click', function () {
        document.getElementById('file-list-panel').classList.remove('visible');
        grid.querySelectorAll('.stat-card.active').forEach(function (c) { c.classList.remove('active'); });
      });
    }

    async function analyze() {
      if (analyzing) return;
      analyzing = true;
      try {
        await loadExtensions();
        var input = document.getElementById('repo-input').value.trim();

        document.getElementById('error').style.display = 'none';
        document.getElementById('results').style.display = 'none';
        document.getElementById('tree-chart').style.display = 'none';
        document.getElementById('autocomplete-list').style.display = 'none';

        if (!input) {
          showError('Please enter a repository name or GitHub URL.');
          return;
        }

        var ownerRepo = parseGitHubOwnerRepo(input);
        if (!ownerRepo) {
          var owner = parseGitHubOwner(input);
          if (owner) {
            await analyzeOwner(owner);
            return;
          }
          showError('Invalid repository. Use "owner/repo" or a GitHub URL.');
          return;
        }

        await analyzeSingleRepo(ownerRepo);
      } finally {
        analyzing = false;
      }
    }

    var ownerTableColumns = [
      { label: 'Repository', key: 'name', type: 'string' },
      { label: 'Language', shortLabel: 'Lang.', key: 'language', type: 'string' },
      { label: 'Stars', key: 'stars', type: 'number' },
      { label: 'Source files', key: 'source', type: 'number' },
      { label: 'Test files', key: 'test', type: 'number' },
      { label: 'Test ratio', key: 'ratio', type: 'number' },
    ];

    function buildOwnerTableHTML(repos, repoIndices) {
      var html = '<div class="owner-table-wrap"><table class="owner-table" id="owner-table">'
        + '<thead><tr>';
      for (var ci = 0; ci < ownerTableColumns.length; ci++) {
        var words = ownerTableColumns[ci].label.split(' ');
        var labelHtml = '<span class="th-label th-full">' + words.map(function(w) { return '<span>' + w + '</span>'; }).join(' ') + '</span>';
        if (ownerTableColumns[ci].shortLabel) {
          labelHtml += '<span class="th-label th-short">' + ownerTableColumns[ci].shortLabel + '</span>';
        }
        var thClass = 'sortable-th' + (ownerTableColumns[ci].shortLabel ? ' has-short-label' : '');
        html += '<th class="' + thClass + '" data-col="' + ci + '">' + labelHtml + ' <span class="sort-arrow"></span></th>';
      }
      html += '<th></th>';
      html += '</tr></thead><tbody>';
      for (var j = 0; j < repoIndices.length; j++) {
        var repo = repos[repoIndices[j]];
        html += '<tr class="owner-table-row" data-repo="' + repo.full_name + '" id="repo-row-' + repoIndices[j] + '">'
          + '<td class="repo-name-cell">' + repo.name + '</td>'
          + '<td>' + (repo.language ? '<i class="' + getDeviconClass(repo.language) + ' colored lang-icon"></i> <span class="lang-text">' + repo.language + '</span>' : '') + '</td>'
          + '<td data-sort-value="' + repo.stargazers_count + '">' + repo.stargazers_count.toLocaleString() + '</td>'
          + '<td id="repo-source-' + repoIndices[j] + '" data-sort-value="">-</td>'
          + '<td id="repo-test-' + repoIndices[j] + '" data-sort-value="">-</td>'
          + '<td id="repo-ratio-' + repoIndices[j] + '" data-sort-value="">-</td>'
          + '<td id="repo-status-' + repoIndices[j] + '"><span class="spinner"></span></td>'
          + '</tr>';
      }
      html += '</tbody></table></div>';
      return html;
    }

    function setupTableSorting(grid) {
      var currentSort = { col: -1, asc: true };
      function sortTable(colIdx, asc) {
        var table = document.getElementById('owner-table');
        var tbody = table.querySelector('tbody');
        var rows = Array.prototype.slice.call(tbody.querySelectorAll('tr'));
        var colType = ownerTableColumns[colIdx].type;
        rows.sort(function (a, b) {
          var cellA = a.children[colIdx];
          var cellB = b.children[colIdx];
          var valA, valB;
          if (colType === 'number') {
            valA = parseFloat(cellA.getAttribute('data-sort-value') || cellA.textContent) || 0;
            valB = parseFloat(cellB.getAttribute('data-sort-value') || cellB.textContent) || 0;
          } else {
            valA = cellA.textContent.toLowerCase();
            valB = cellB.textContent.toLowerCase();
          }
          if (valA < valB) return asc ? -1 : 1;
          if (valA > valB) return asc ? 1 : -1;
          return 0;
        });
        for (var ri = 0; ri < rows.length; ri++) {
          tbody.appendChild(rows[ri]);
        }
        grid.querySelectorAll('.sort-arrow').forEach(function (arrow) { arrow.textContent = ''; });
        grid.querySelectorAll('.sortable-th')[colIdx].querySelector('.sort-arrow').textContent = asc ? ' \u25B2' : ' \u25BC';
      }
      grid.querySelectorAll('.sortable-th').forEach(function (th) {
        th.addEventListener('click', function (e) {
          e.stopPropagation();
          var colIdx = parseInt(this.getAttribute('data-col'));
          if (currentSort.col === colIdx) {
            currentSort.asc = !currentSort.asc;
          } else {
            currentSort.col = colIdx;
            currentSort.asc = true;
          }
          sortTable(currentSort.col, currentSort.asc);
        });
      });
    }

    function setupTableRowClicks(grid) {
      grid.querySelectorAll('.owner-table-row').forEach(function (row) {
        row.addEventListener('click', function () {
          document.getElementById('repo-input').value = this.getAttribute('data-repo');
          analyze();
        });
      });
    }

    function fixLangIcons(grid) {
      setTimeout(function () {
        grid.querySelectorAll('.lang-icon').forEach(function (icon) {
          if (icon.offsetWidth <= 1) {
            icon.style.display = 'none';
            var text = icon.nextElementSibling;
            if (text && text.classList.contains('lang-text')) {
              text.classList.add('no-icon');
            }
          }
        });
      }, 500);
    }

    function fetchOwnerRepoStats(repos, repoIndices) {
      for (var k = 0; k < repoIndices.length; k++) {
        (function (repo, index) {
          ensureAnalyzeRepo(repo.full_name).then(function (response) {
            var sourceEl = document.getElementById('repo-source-' + index);
            if (!sourceEl) return;
            if (response.error) {
              var row = document.getElementById('repo-row-' + index);
              if (row) row.remove();
              return;
            }
            var result = response.result;
            var stats = result.stats;
            sourceEl.textContent = stats.sourceFiles.toLocaleString();
            sourceEl.setAttribute('data-sort-value', stats.sourceFiles);
            var testEl = document.getElementById('repo-test-' + index);
            testEl.textContent = stats.testFiles.toLocaleString();
            testEl.setAttribute('data-sort-value', stats.testFiles);
            var ratioEl = document.getElementById('repo-ratio-' + index);
            ratioEl.textContent = stats.testRatio + '%';
            ratioEl.setAttribute('data-sort-value', stats.testRatio);
            document.getElementById('repo-status-' + index).textContent = '\u2705';
          });
        })(repos[repoIndices[k]], repoIndices[k]);
      }
    }

    function renderOwnerRepos(owner, repos) {
      var resultsEl = document.getElementById('results');
      var grid = document.getElementById('stats-grid');
      var ownerIcon = '<i class="devicon-' + owner.toLowerCase() + '-plain colored" style="font-size:1.3rem;margin-right:6px;"></i>';
      document.getElementById('results-title-text').innerHTML = ownerIcon + owner;
      document.getElementById('gh-link').href = 'https://github.com/' + owner;

      var repoIndices = [];
      for (var i = 0; i < repos.length; i++) {
        if (!repos[i].fork) repoIndices.push(i);
      }

      grid.innerHTML = buildOwnerTableHTML(repos, repoIndices);
      resultsEl.style.display = 'block';

      fixLangIcons(grid);
      setupTableSorting(grid);
      setupTableRowClicks(grid);
      fetchOwnerRepoStats(repos, repoIndices);
    }

    // Recent searches
    function getRecent() {
      try {
        return JSON.parse(localStorage.getItem('testminer_recent') || '[]');
      } catch (e) { return []; }
    }

    function saveRecent(repo) {
      var recent = getRecent().filter(function (r) { return r !== repo; });
      recent.unshift(repo);
      if (recent.length > 5) recent = recent.slice(0, 5);
      localStorage.setItem('testminer_recent', JSON.stringify(recent));
      renderRecent();
    }

    function renderRecent() {
      var recent = getRecent();
      var container = document.getElementById('recent');
      var list = document.getElementById('recent-list');
      if (recent.length === 0) {
        container.style.display = 'none';
        return;
      }
      list.innerHTML = recent.map(function (r) {
        return '<span class="recent-item" data-repo="' + r + '">' + r + '<span class="recent-remove">&times;</span></span>';
      }).join('');
      container.style.display = 'block';
    }

    document.getElementById('recent-list').addEventListener('click', function (e) {
      if (e.target.closest('.recent-remove')) {
        var item = e.target.closest('.recent-item');
        var repo = item.getAttribute('data-repo');
        var recent = getRecent().filter(function (r) { return r !== repo; });
        localStorage.setItem('testminer_recent', JSON.stringify(recent));
        renderRecent();
        return;
      }
      var item = e.target.closest('.recent-item');
      if (item) {
        document.getElementById('repo-input').value = item.getAttribute('data-repo');
        analyze();
      }
    });

    document.getElementById('recent-clear').addEventListener('click', function () {
      localStorage.removeItem('testminer_recent');
      localStorage.removeItem('testminer_analyze_cache');
      analyzeRepoCache = {};
      renderRecent();
    });

    renderRecent();

    // Suggestions
    document.querySelectorAll('.suggestion-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.getElementById('repo-input').value = this.getAttribute('data-value');
        analyze();
      });
    });

    // Autocomplete
    var repoData = [];
    var ownerData = [];
    var activeIndex = -1;

    fetch('data/repos.csv')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var cols = lines[i].split(',');
          repoData.push({
            name: cols[0],
            language: cols[1] || '',
            topics: cols[2] || ''
          });
        }
      });

    fetch('data/owners.csv')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var owner = lines[i].trim();
          if (owner) {
            ownerData.push(owner);
          }
        }
      })
      .catch(function (err) { console.error('Failed to load owners.csv:', err); });

    var repoInput = document.getElementById('repo-input');
    var acList = document.getElementById('autocomplete-list');

    function searchRepos(query) {
      var q = query.toLowerCase();
      var results = [];

      // Search owners
      for (var j = 0; j < ownerData.length && results.length < 4; j++) {
        if (ownerData[j].toLowerCase().includes(q)) {
          results.push({ type: 'owner', name: ownerData[j] });
        }
      }

      // Search repos
      for (var i = 0; i < repoData.length && results.length < 12; i++) {
        var r = repoData[i];
        var matchedOn = [];
        if (r.name.toLowerCase().includes(q)) {
          matchedOn.push('name');
        }
        if (r.topics && r.topics.toLowerCase().includes(q)) {
          matchedOn.push('topics');
        }
        if (matchedOn.length > 0) {
          results.push({ type: 'repo', repo: r, matchedOn: matchedOn });
        }
      }
      return results;
    }

    var deviconAliases = {
      'c++': 'cplusplus',
      'c#': 'csharp',
      'shell': 'bash',
      'html': 'html5',
      'css': 'css3',
      'jupyter notebook': 'jupyter',
      'objective-c': 'objectivec',
      'vim script': 'vim',
      'emacs lisp': 'emacs',
    };

    function getDeviconClass(language) {
      if (!language) return '';
      var key = language.toLowerCase();
      var name = deviconAliases[key] || key.replace(/[^a-z0-9]/g, '');
      return 'devicon-' + name + '-plain';
    }

    function highlightMatch(text, query) {
      var idx = text.toLowerCase().indexOf(query);
      if (idx === -1) return text;
      return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + query.length) + '</mark>' + text.substring(idx + query.length);
    }

    function buildOwnerItemHTML(r, q, index) {
      var ownerName = highlightMatch(r.name, q);
      return '<div class="autocomplete-item" data-index="' + index + '"><span class="ac-tag">owner</span><span class="ac-name">' + ownerName + '</span></div>';
    }

    function buildRepoItemHTML(r, q, index) {
      var topicDetail = '';
      if (r.matchedOn.indexOf('topics') >= 0) {
        var matched = r.repo.topics.split(';').filter(function (t) { return t.toLowerCase().includes(q); });
        if (matched.length > 0) {
          topicDetail = '<span class="match-detail">topics: ' + matched.map(function (t) { return highlightMatch(t, q); }).join(', ') + '</span>';
        }
      }
      var name = r.matchedOn.indexOf('name') >= 0 ? highlightMatch(r.repo.name, q) : r.repo.name;
      var langRight = '';
      if (r.repo.language) {
        var langIconClass = getDeviconClass(r.repo.language);
        var langIcon = langIconClass ? '<i class="' + langIconClass + ' colored lang-icon"></i>' : '';
        langRight = '<span class="ac-lang">' + r.repo.language + langIcon + '</span>';
      }
      return '<div class="autocomplete-item" data-index="' + index + '"><span class="ac-tag">repo</span><span class="ac-name">' + name + topicDetail + '</span>' + langRight + '</div>';
    }

    function renderAutocomplete(results) {
      if (results.length === 0) {
        acList.style.display = 'none';
        return;
      }
      var q = repoInput.value.trim().toLowerCase();
      var html = '';
      for (var i = 0; i < results.length; i++) {
        var r = results[i];
        html += r.type === 'owner' ? buildOwnerItemHTML(r, q, i) : buildRepoItemHTML(r, q, i);
      }
      acList.innerHTML = html;
      acList.style.display = 'block';
      activeIndex = -1;
    }

    repoInput.addEventListener('input', function () {
      var q = this.value.trim();
      if (q.length < 2) {
        acList.style.display = 'none';
        return;
      }
      renderAutocomplete(searchRepos(q));
    });

    repoInput.addEventListener('keydown', function (e) {
      var items = acList.querySelectorAll('.autocomplete-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActive(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        updateActive(items);
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && items[activeIndex]) {
          e.preventDefault();
          selectItem(items[activeIndex]);
        } else {
          analyze();
        }
      } else if (e.key === 'Escape') {
        acList.style.display = 'none';
      }
    });

    function updateActive(items) {
      for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle('active', i === activeIndex);
      }
      if (items[activeIndex]) {
        items[activeIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    function selectItem(item) {
      var idx = parseInt(item.getAttribute('data-index'));
      var results = searchRepos(repoInput.value.trim());
      if (results[idx]) {
        repoInput.value = results[idx].type === 'owner' ? results[idx].name : results[idx].repo.name;
      }
      acList.style.display = 'none';
    }

    acList.addEventListener('mousedown', function (e) {
      var item = e.target.closest('.autocomplete-item');
      if (item) {
        e.preventDefault();
        selectItem(item);
      }
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.search')) {
        acList.style.display = 'none';
      }
    });

    document.getElementById('copy-link-btn').addEventListener('click', function () {
      var url = location.href.split('#')[0] + location.hash;
      navigator.clipboard.writeText(url).then(function () {
        var btn = document.getElementById('copy-link-btn');
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = 'Copy link'; }, 1500);
      });
    });

    // Auto-analyze from URL hash
    function analyzeFromHash() {
      var hash = location.hash.substring(1);
      if (hash) {
        document.getElementById('repo-input').value = decodeURIComponent(hash);
        analyze();
      }
    }

    analyzeFromHash();
    window.addEventListener('hashchange', analyzeFromHash);
  </script>

</body>
</html>
