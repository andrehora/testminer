<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestMiner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f9fefb 0%, #f3fcf6 50%, #f9fefb 100%);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px 40px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 1rem;
      color: #64748b;
      margin-top: 8px;
    }

    .search {
      position: relative;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .search input {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #1e293b;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .search input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    .search input::placeholder { color: #94a3b8; }

    .search button {
      padding: 14px 28px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .search button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    .search button:active { transform: translateY(0); }

    .search button:disabled {
      background: #86efac;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 100px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .autocomplete-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.93rem;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.12s;
    }

    .autocomplete-item .lang-icon {
      font-size: 1.2rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .autocomplete-item:first-child { border-radius: 12px 12px 0 0; }
    .autocomplete-item:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }
    .autocomplete-item:only-child { border-radius: 12px; }

    .autocomplete-item:hover,
    .autocomplete-item.active { background: #f0fdf4; }

    .autocomplete-item mark {
      background: #fef9c3;
      color: inherit;
      padding: 0 2px;
      border-radius: 3px;
    }

    .autocomplete-item .match-detail {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-left: 8px;
    }

    .recent {
      margin-bottom: 24px;
      display: none;
    }

    .recent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .recent-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .recent-clear {
      font-size: 0.75rem;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .recent-clear:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recent-item {
      font-size: 0.85rem;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #dcfce7;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .recent-item:hover {
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .recent-item .recent-remove {
      margin-left: 6px;
      color: #86efac;
      font-weight: 600;
      font-size: 0.9rem;
      line-height: 1;
    }

    .recent-item:hover .recent-remove {
      color: #ef4444;
    }

    #error {
      color: #ef4444;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }

    #results { display: none; }

    .results-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 16px;
    }

    .owner-link {
      color: #16a34a;
      text-decoration: none;
    }

    .owner-link:hover {
      text-decoration: underline;
    }

    .copy-link-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #64748b;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .copy-link-btn:hover {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #16a34a;
    }

    .stats-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .stat-card .label {
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 500;
    }

    .stat-card .value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #22c55e;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .repo-item {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .repo-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border-color: #bbf7d0;
    }

    .repo-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: #16a34a;
    }

    .repo-item-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .repo-item-stars {
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 500;
    }

    .repo-item-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .repo-topic {
      font-size: 0.75rem;
      background: #f0fdf4;
      color: #16a34a;
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 500;
    }

    .repo-item-stats {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 0.82rem;
      color: #64748b;
    }

    .repo-item-stats span {
      font-weight: 500;
    }

    .repo-item-stats .stat-value {
      color: #22c55e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>TestMiner</h1>
      <p>Analyze test practices in GitHub repositories</p>
    </div>

    <div class="search">
      <input id="repo-input" type="text" placeholder="GitHub URL, owner/repo, or owner for multiple analysis" autocomplete="off" />
      <button id="analyze-btn" onclick="analyze()">Analyze</button>
      <div id="autocomplete-list" class="autocomplete-list"></div>
    </div>

    <div id="recent" class="recent">
      <div class="recent-header">
        <div class="recent-label">Recently viewed</div>
        <button class="recent-clear" id="recent-clear">Clear all</button>
      </div>
      <div class="recent-list" id="recent-list"></div>
    </div>

    <div id="error"></div>

    <div id="results">
      <h2 id="results-title" class="results-title"><span id="results-title-text"></span><button class="copy-link-btn" id="copy-link-btn">Copy link</button></h2>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

  </div>

  <script src="js/app.js?v=2"></script>
  <script>
    var analyzing = false;
    async function analyze() {
      if (analyzing) return;
      analyzing = true;
      try {
        const input = document.getElementById('repo-input').value.trim();
        const btn = document.getElementById('analyze-btn');
        const errorEl = document.getElementById('error');
        const resultsEl = document.getElementById('results');

        errorEl.style.display = 'none';
        resultsEl.style.display = 'none';
        document.getElementById('autocomplete-list').style.display = 'none';

        if (!input) {
          errorEl.textContent = 'Please enter a repository name or GitHub URL.';
          errorEl.style.display = 'block';
          return;
        }

        const ownerRepo = parseGitHubOwnerRepo(input);
        if (!ownerRepo) {
          const owner = parseGitHubOwner(input);
          if (owner) {
            btn.disabled = true;
            btn.textContent = 'Searching...';
            const repos = await fetchOwnerRepos(owner);
            btn.disabled = false;
            btn.textContent = 'Analyze';
            if (!repos) {
              errorEl.textContent = 'Could not find GitHub user "' + owner + '".';
              errorEl.style.display = 'block';
              return;
            }
            renderOwnerRepos(owner, repos);
            saveRecent(owner);
            history.replaceState(null, '', '#' + owner);
            return;
          }
          errorEl.textContent = 'Invalid repository. Use "owner/repo" or a GitHub URL.';
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Analyzing...';

        const data = await fetchJsDelivrFiles(ownerRepo);
        btn.disabled = false;
        btn.textContent = 'Analyze';

        if (data && data.error === 'too_large') {
          var tooLargeOwner = ownerRepo.split('/')[0];
          errorEl.textContent = 'Repository "' + ownerRepo + '"size is too large. Try another repository of ' + tooLargeOwner + ' 😎';
          errorEl.style.display = 'block';
          var tooLargeRepos = await fetchOwnerRepos(tooLargeOwner);
          if (tooLargeRepos) {
            renderOwnerRepos(tooLargeOwner, tooLargeRepos);
          }
          return;
        }

        if (!data) {
          errorEl.textContent = 'Could not fetch repository data. Check the repo name and try again.';
          errorEl.style.display = 'block';
          return;
        }

        const files = parseJsDelivrFiles(data);
        const stats = computeTestStats(files);

        const cards = [
          { label: 'Total files',       value: stats.total },
          { label: 'Test-related files',value: stats.testRelatedFiles },
          { label: 'Test files',        value: stats.testFiles },
          { label: 'Mock files',        value: stats.mockFiles },
          { label: 'E2E files',         value: stats.e2eFiles },
          { label: 'Snapshot files',    value: stats.snapshotFiles },
          { label: 'CI test files',     value: stats.ciTestFiles },
          { label: 'Smoke files',       value: stats.smokeFiles },
          { label: 'Fixture files',     value: stats.fixtureFiles },
          { label: 'Benchmark files',   value: stats.benchmarkFiles },
        ];

        const grid = document.getElementById('stats-grid');
        grid.innerHTML = cards.filter(function (c) {
          return c.value > 0;
        }).map(function (c) {
          return '<div class="stat-card"><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>';
        }).join('');

        var ownerPart = ownerRepo.split('/')[0];
        var repoPart = ownerRepo.split('/')[1];
        document.getElementById('results-title-text').innerHTML = '<a class="owner-link" href="#' + ownerPart + '">' + ownerPart + '</a> / ' + repoPart;
        resultsEl.style.display = 'block';

        saveRecent(ownerRepo);
        history.replaceState(null, '', '#' + ownerRepo);
      } finally {
        analyzing = false;
      }
    }

    function renderOwnerRepos(owner, repos) {
      var resultsEl = document.getElementById('results');
      var grid = document.getElementById('stats-grid');
      document.getElementById('results-title-text').textContent = owner;

      var html = '<div class="repo-list">';
      for (var i = 0; i < repos.length; i++) {
        var repo = repos[i];
        if (repo.fork) continue;
        var topicsHtml = '';
        if (repo.topics && repo.topics.length > 0) {
          topicsHtml = '<div class="repo-item-topics">';
          for (var j = 0; j < repo.topics.length; j++) {
            topicsHtml += '<span class="repo-topic">' + repo.topics[j] + '</span>';
          }
          topicsHtml += '</div>';
        }
        html += '<div class="repo-item" data-repo="' + repo.full_name + '" id="repo-item-' + i + '">'
          + '<div class="repo-item-name">' + repo.name + '</div>'
          + '<div class="repo-item-meta">'
          + '<span class="repo-item-stars">&#9733; ' + repo.stargazers_count.toLocaleString() + '</span>'
          + (repo.language ? '<span>' + repo.language + '</span>' : '')
          + '</div>'
          + '<div class="repo-item-stats" id="repo-stats-' + i + '"></div>'
          + topicsHtml
          + '</div>';
      }
      html += '</div>';

      grid.innerHTML = html;
      resultsEl.style.display = 'block';

      grid.querySelectorAll('.repo-item').forEach(function (item) {
        item.addEventListener('click', function () {
          document.getElementById('repo-input').value = this.getAttribute('data-repo');
          analyze();
        });
      });

      // Fetch file stats for each repo
      for (var k = 0; k < repos.length; k++) {
        if (repos[k].fork) continue;
        (function (repo, index) {
          fetchJsDelivrFiles(repo.full_name).then(function (data) {
            var statsEl = document.getElementById('repo-stats-' + index);
            if (!statsEl) return;
            if (!data || data.error) {
              statsEl.innerHTML = '';
              return;
            }
            var files = parseJsDelivrFiles(data);
            var stats = computeTestStats(files);
            var statItems = [
              { label: 'Total files', value: stats.total },
              { label: 'Test-related files', value: stats.testRelatedFiles },
              { label: 'Test files', value: stats.testFiles },
              { label: 'Mock files', value: stats.mockFiles },
              { label: 'E2E files', value: stats.e2eFiles },
              { label: 'Snapshot files', value: stats.snapshotFiles },
              { label: 'CI test files', value: stats.ciTestFiles },
              { label: 'Smoke files', value: stats.smokeFiles },
              { label: 'Fixture files', value: stats.fixtureFiles },
              { label: 'Benchmark files', value: stats.benchmarkFiles },
            ];
            statsEl.innerHTML = statItems.filter(function (s) {
              return s.value > 0;
            }).map(function (s) {
              return '<span>' + s.label + ': <span class="stat-value">' + s.value + '</span></span>';
            }).join('');
          });
        })(repos[k], k);
      }
    }

    // Recent searches
    function getRecent() {
      try {
        return JSON.parse(localStorage.getItem('testminer_recent') || '[]');
      } catch (e) { return []; }
    }

    function saveRecent(repo) {
      var recent = getRecent().filter(function (r) { return r !== repo; });
      recent.unshift(repo);
      if (recent.length > 5) recent = recent.slice(0, 5);
      localStorage.setItem('testminer_recent', JSON.stringify(recent));
      renderRecent();
    }

    function renderRecent() {
      var recent = getRecent();
      var container = document.getElementById('recent');
      var list = document.getElementById('recent-list');
      if (recent.length === 0) {
        container.style.display = 'none';
        return;
      }
      list.innerHTML = recent.map(function (r) {
        return '<span class="recent-item" data-repo="' + r + '">' + r + '<span class="recent-remove">&times;</span></span>';
      }).join('');
      container.style.display = 'block';
    }

    document.getElementById('recent-list').addEventListener('click', function (e) {
      if (e.target.closest('.recent-remove')) {
        var item = e.target.closest('.recent-item');
        var repo = item.getAttribute('data-repo');
        var recent = getRecent().filter(function (r) { return r !== repo; });
        localStorage.setItem('testminer_recent', JSON.stringify(recent));
        renderRecent();
        return;
      }
      var item = e.target.closest('.recent-item');
      if (item) {
        document.getElementById('repo-input').value = item.getAttribute('data-repo');
        analyze();
      }
    });

    document.getElementById('recent-clear').addEventListener('click', function () {
      localStorage.removeItem('testminer_recent');
      renderRecent();
    });

    renderRecent();

    // Autocomplete
    var repoData = [];
    var ownerData = [];
    var activeIndex = -1;

    fetch('data/repos.csv')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var cols = lines[i].split(',');
          repoData.push({
            name: cols[0],
            language: cols[1] || '',
            topics: cols[2] || ''
          });
        }
      });

    fetch('data/owners.csv')
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var owner = lines[i].trim();
          if (owner) {
            ownerData.push(owner);
          }
        }
      })
      .catch(function (err) { console.error('Failed to load owners.csv:', err); });

    var repoInput = document.getElementById('repo-input');
    var acList = document.getElementById('autocomplete-list');

    function searchRepos(query) {
      var q = query.toLowerCase();
      var results = [];

      // Search owners
      for (var j = 0; j < ownerData.length && results.length < 4; j++) {
        if (ownerData[j].toLowerCase().includes(q)) {
          results.push({ type: 'owner', name: ownerData[j] });
        }
      }

      // Search repos
      for (var i = 0; i < repoData.length && results.length < 12; i++) {
        var r = repoData[i];
        var matchedOn = [];
        if (r.name.toLowerCase().includes(q)) {
          matchedOn.push('name');
        }
        if (r.topics && r.topics.toLowerCase().includes(q)) {
          matchedOn.push('topics');
        }
        if (matchedOn.length > 0) {
          results.push({ type: 'repo', repo: r, matchedOn: matchedOn });
        }
      }
      return results;
    }

    var deviconMap = {
      'python': 'devicon-python-plain',
      'javascript': 'devicon-javascript-plain',
      'typescript': 'devicon-typescript-plain',
      'java': 'devicon-java-plain',
      'c': 'devicon-c-plain',
      'c++': 'devicon-cplusplus-plain',
      'c#': 'devicon-csharp-plain',
      'go': 'devicon-go-plain',
      'rust': 'devicon-rust-plain',
      'ruby': 'devicon-ruby-plain',
      'php': 'devicon-php-plain',
      'swift': 'devicon-swift-plain',
      'kotlin': 'devicon-kotlin-plain',
      'dart': 'devicon-dart-plain',
      'scala': 'devicon-scala-plain',
      'r': 'devicon-r-plain',
      'perl': 'devicon-perl-plain',
      'lua': 'devicon-lua-plain',
      'haskell': 'devicon-haskell-plain',
      'elixir': 'devicon-elixir-plain',
      'clojure': 'devicon-clojure-plain',
      'shell': 'devicon-bash-plain',
      'html': 'devicon-html5-plain',
      'css': 'devicon-css3-plain',
      'sass': 'devicon-sass-original',
      'jupyter notebook': 'devicon-jupyter-plain',
      'objective-c': 'devicon-objectivec-plain',
      'matlab': 'devicon-matlab-plain',
      'groovy': 'devicon-groovy-plain',
      'vim script': 'devicon-vim-plain',
      'emacs lisp': 'devicon-emacs-original',
      'ocaml': 'devicon-ocaml-plain',
      'erlang': 'devicon-erlang-plain',
      'zig': 'devicon-zig-plain',
      'nim': 'devicon-nim-plain',
    };

    function getDeviconClass(language) {
      if (!language) return '';
      return deviconMap[language.toLowerCase()] || '';
    }

    function highlightMatch(text, query) {
      var idx = text.toLowerCase().indexOf(query);
      if (idx === -1) return text;
      return text.substring(0, idx) + '<mark>' + text.substring(idx, idx + query.length) + '</mark>' + text.substring(idx + query.length);
    }

    function renderAutocomplete(results) {
      if (results.length === 0) {
        acList.style.display = 'none';
        return;
      }
      var q = repoInput.value.trim().toLowerCase();
      var html = '';
      for (var i = 0; i < results.length; i++) {
        var r = results[i];
        if (r.type === 'owner') {
          var ownerName = highlightMatch(r.name, q);
          var ownerIconClass = 'devicon-' + r.name.toLowerCase() + '-plain';
          html += '<div class="autocomplete-item" data-index="' + i + '"><i class="' + ownerIconClass + ' colored lang-icon owner-devicon"></i><span>' + ownerName + '<span class="match-detail">owner</span></span></div>';
        } else {
          var detail = '';
          if (r.repo.language) {
            detail += '<span class="match-detail">' + r.repo.language + '</span>';
          }
          if (r.matchedOn.indexOf('topics') >= 0) {
            var matched = r.repo.topics.split(';').filter(function (t) { return t.toLowerCase().includes(q); });
            if (matched.length > 0) {
              detail += '<span class="match-detail">topics: ' + matched.map(function (t) { return highlightMatch(t, q); }).join(', ') + '</span>';
            }
          }
          var name = r.matchedOn.indexOf('name') >= 0 ? highlightMatch(r.repo.name, q) : r.repo.name;
          var iconClass = getDeviconClass(r.repo.language);
          var icon = iconClass ? '<i class="' + iconClass + ' colored lang-icon"></i>' : '<i class="devicon-github-original lang-icon"></i>';
          html += '<div class="autocomplete-item" data-index="' + i + '">' + icon + '<span>' + name + detail + '</span></div>';
        }
      }
      acList.innerHTML = html;
      acList.style.display = 'block';
      activeIndex = -1;

      // Fallback: replace owner devicons that didn't render with github icon
      var ownerIcons = acList.querySelectorAll('.owner-devicon');
      for (var j = 0; j < ownerIcons.length; j++) {
        var content = window.getComputedStyle(ownerIcons[j], '::before').getPropertyValue('content');
        if (!content || content === 'none' || content === 'normal') {
          ownerIcons[j].className = 'devicon-github-original lang-icon';
        }
      }
    }

    repoInput.addEventListener('input', function () {
      var q = this.value.trim();
      if (q.length < 2) {
        acList.style.display = 'none';
        return;
      }
      renderAutocomplete(searchRepos(q));
    });

    repoInput.addEventListener('keydown', function (e) {
      var items = acList.querySelectorAll('.autocomplete-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActive(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        updateActive(items);
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && items[activeIndex]) {
          e.preventDefault();
          selectItem(items[activeIndex]);
        } else {
          analyze();
        }
      } else if (e.key === 'Escape') {
        acList.style.display = 'none';
      }
    });

    function updateActive(items) {
      for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle('active', i === activeIndex);
      }
      if (items[activeIndex]) {
        items[activeIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    function selectItem(item) {
      var idx = parseInt(item.getAttribute('data-index'));
      var results = searchRepos(repoInput.value.trim());
      if (results[idx]) {
        repoInput.value = results[idx].type === 'owner' ? results[idx].name : results[idx].repo.name;
      }
      acList.style.display = 'none';
    }

    acList.addEventListener('mousedown', function (e) {
      var item = e.target.closest('.autocomplete-item');
      if (item) {
        e.preventDefault();
        selectItem(item);
      }
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.search')) {
        acList.style.display = 'none';
      }
    });

    document.getElementById('copy-link-btn').addEventListener('click', function () {
      var url = location.href.split('#')[0] + location.hash;
      navigator.clipboard.writeText(url).then(function () {
        var btn = document.getElementById('copy-link-btn');
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = 'Copy link'; }, 1500);
      });
    });

    // Auto-analyze from URL hash
    function analyzeFromHash() {
      var hash = location.hash.substring(1);
      if (hash) {
        document.getElementById('repo-input').value = decodeURIComponent(hash);
        analyze();
      }
    }

    analyzeFromHash();
    window.addEventListener('hashchange', analyzeFromHash);
  </script>

</body>
</html>
